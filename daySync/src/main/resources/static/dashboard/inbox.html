<h2>Inbox</h2>

<h3>Add Task</h3>

<input id="title" placeholder="Title"><br>

<input id="description" placeholder="Description"><br>

<select id="category">
<option>Work</option>
<option>Study</option>
<option>Personal</option>
</select><br>

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select><br>

<input type="date" id="dueDate"><br>

<button onclick="addTask()">Add Task</button>

<h3>Your Tasks</h3>

<div id="taskList"></div>
