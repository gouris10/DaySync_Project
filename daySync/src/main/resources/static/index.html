<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DaySync</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">📋 DaySync</div>

<p class="welcome">
Welcome, <span id="welcomeUser"></span>
</p>

<button class="add-task-btn" onclick="showAddTask()">+ Add Task</button>

<ul class="menu">

<li onclick="loadTasks()">Inbox</li>

<li onclick="loadToday()">
Today
<span id="todayCount" class="badge"></span>
</li>

<li onclick="loadCompletedPage()">Completed</li>

</ul>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>


<!-- MAIN -->

<div class="main">

<h1 id="pageTitle">My Tasks</h1>

<!-- PROGRESS BAR -->

<h3>Today's Progress</h3>

<div class="progress-container">
    <div id="progressBar" class="progress-bar"></div>
</div>

<p id="progressText">0 / 0 tasks completed</p>


<!-- Filter -->

<div class="filter-bar">

<select id="filterCategory" onchange="applyFilters()">
<option value="">All Categories</option>
<option value="Work">Work</option>
<option value="Personal">Personal</option>
<option value="Study">Study</option>
</select>

<select id="filterPriority" onchange="applyFilters()">
<option value="">All Priorities</option>
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>

<input type="date" id="filterDate" onchange="applyFilters()">

<button onclick="clearFilters()">Clear</button>

</div>

<!-- TASK FORM -->

<div class="task-form" id="taskForm">

<input id="title" placeholder="Task title">

<input id="description" placeholder="Description">

<select id="category">
<option>Work</option>
<option>Personal</option>
<option>Study</option>
</select>

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input id="dueDate" type="date">

<button onclick="addTask()">Add Task</button>

</div>

<!-- TASK LIST -->

<div id="taskList"></div>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
